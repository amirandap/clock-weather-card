name: yarn

on:
  push:
  pull_request:

jobs:
  build:
    # Skip version-bump commits from the auto-release workflow
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    name: yarn
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Build
        run: |
          yarn install
          yarn build
      - name: Lint
        run: |
          yarn lint
