name: Auto Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HUSKY: 0

jobs:
  release:
    name: Bump version & publish release
    runs-on: ubuntu-latest
    # Skip version-bump commits pushed back by this workflow to avoid infinite loops
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Build
        run: |
          npm ci --legacy-peer-deps
          npm run build
          echo "::group::Dirty files after npm ci + build"
          git status --short
          git diff --name-only
          echo "::endgroup::"

      - name: Bump patch version
        id: version
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit version bump & push tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          # npm ci never modifies package-lock.json so the working tree
          # is guaranteed clean after the build step. No defensive reset needed.
          npm pkg set version="${{ steps.version.outputs.version }}"
          # Commit the bump locally first, then rebase on top of remote master.
          # git pull --rebase requires a clean working tree; committing first satisfies that.
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git tag v${{ steps.version.outputs.version }}
          git pull --rebase origin master
          git push origin HEAD:master
          git push origin v${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/hass-weather-card.js
            dist/hass-weather-card.js.gz
            dist/dotlottie-player.wasm
