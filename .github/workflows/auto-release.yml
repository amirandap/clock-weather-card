name: Auto Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HUSKY: 0

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    # Skip version-bump commits pushed back by this workflow to avoid infinite loops
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Compute next version
        id: version
        run: |
          # Derive next patch version from the latest semver tag, no commit needed
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="1.0.0"
          else
            NEXT=$(echo "$LATEST" | sed 's/^v//' | awk -F. '{print $1"."$2"."$3+1}')
          fi
          echo "version=$NEXT" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT"

      - name: Build
        run: |
          npm ci --legacy-peer-deps
          # Stamp the version into package.json for the bundle (no commit)
          npm pkg set version="${{ steps.version.outputs.version }}"
          npm run build

      - name: Tag & push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git tag v${{ steps.version.outputs.version }}
          git push origin v${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/hass-weather-card.js
            dist/hass-weather-card.js.gz
            dist/dotlottie-player.wasm
